<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GND Hero — Three.js render</title>
<style>
  html, body { margin: 0; padding: 0; background: #FFF3E8; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const W = 1920, H = 1080;

/* Renderer — transparent so the page bg (#FFF3E8 cream) shows through, matching the
   site stage. Antialias on, fixed pixel ratio for deterministic captures. */
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, preserveDrawingBuffer: true });
renderer.setSize(W, H);
renderer.setPixelRatio(1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();

/* Env map REACTIVATED — required for Meshy's metalness map + roughness map to work
   correctly. Without env, PBR reflections have nothing to sample. */
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
scene.environmentIntensity = 0.55;

/* Camera — 3/4 view, animated for dolly-in via setProgress(t).
   Camera position pulled back + raised, lookAt up high → bust composition with proper
   headroom (head at upper third, drape filling lower half). */
const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 100);
camera.position.set(0, 0.7, 5.4);
camera.lookAt(0, 0.55, 0);

/* Lighting — calibrated GND charte :
   - ambient cream very subtle
   - key warm cream from upper-left
   - rim orange from back-right (catches the helmet edges)
   - fill from below to lift the chin/drape */
/* Direct lights — env map disabled, so these carry the lighting alone. Calibrated GND
   charte : warm cream key from upper-left, orange rim from back-right, cream fill from
   below. */
scene.add(new THREE.AmbientLight(0xF5E8DC, 0.35));

const keyLight = new THREE.DirectionalLight(0xFFF3E8, 1.4);
keyLight.position.set(-2.5, 3.2, 4);
scene.add(keyLight);

const rimLight = new THREE.DirectionalLight(0xFF954F, 0.5);
rimLight.position.set(3.5, 1.5, -2.2);
scene.add(rimLight);

const fillLight = new THREE.DirectionalLight(0xFDF6EE, 0.45);
fillLight.position.set(0, -1.8, 3.5);
scene.add(fillLight);

/* Visor power-up point light — orange, intensity animated by progress t.
   Drastically reduced and made more local so it kisses only the visor. */
const visorLight = new THREE.PointLight(0xFF954F, 0, 2.5, 2.2);
visorLight.position.set(0, 0.65, 1.4);
scene.add(visorLight);

/* Golden motes — particle system, ambient drift around the figure. */
const PARTICLE_COUNT = 90;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const phases = new Float32Array(PARTICLE_COUNT);
const speeds = new Float32Array(PARTICLE_COUNT);
for (let i = 0; i < PARTICLE_COUNT; i++) {
  positions[i*3] = (Math.random() - 0.5) * 5.5;
  positions[i*3+1] = (Math.random() - 0.5) * 3.5 + 0.4;
  positions[i*3+2] = (Math.random() - 0.5) * 3.5;
  phases[i] = Math.random() * Math.PI * 2;
  speeds[i] = 0.3 + Math.random() * 0.6;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const particleMat = new THREE.PointsMaterial({
  color: 0xFFD27F,
  size: 0.045,
  transparent: true,
  opacity: 0.55,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

/* Figure pivot — for yaw rotation that's clean around vertical axis. */
const figurePivot = new THREE.Group();
scene.add(figurePivot);

let visorMaterials = [];

const loader = new GLTFLoader();
loader.load('/assets/3d/hero-figure.glb', (gltf) => {
  const figure = gltf.scene;

  // Center + scale to fit ~3 unit cube
  const box = new THREE.Box3().setFromObject(figure);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  figure.position.sub(center);
  const maxSide = Math.max(size.x, size.y, size.z);
  const scaleFactor = 2.6 / maxSide;
  figure.scale.setScalar(scaleFactor);
  // Composition downshift — bust positioned so head is upper-third with proper headroom
  figure.position.y -= 0.5;

  // Identify metallic materials → boost their metalness + lower roughness so they
  // properly reflect the env map → bronze/copper actually shows.
  // Print debug info so we can verify Meshy material properties.
  const matInfo = [];
  figure.traverse((obj) => {
    if (obj.isMesh && obj.material) {
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      mats.forEach(mat => {
        matInfo.push({
          name: mat.name || '(unnamed)',
          type: mat.type,
          metalness: mat.metalness,
          roughness: mat.roughness,
          transmission: mat.transmission,
          transparent: mat.transparent,
          color: mat.color ? '#' + mat.color.getHexString() : null,
          hasMap: !!mat.map,
          mapSize: mat.map?.image ? `${mat.map.image.width}x${mat.map.image.height}` : null,
          hasNormalMap: !!mat.normalMap,
          hasMetalnessMap: !!mat.metalnessMap,
          hasRoughnessMap: !!mat.roughnessMap,
          hasEmissiveMap: !!mat.emissiveMap,
          hasAOMap: !!mat.aoMap,
        });
        // PRESERVE Meshy's baked maps : metalness map (varies per pixel), roughness
        // map (varies per pixel), and CRUCIALLY the emissive map (the orange splashes
        // / visor accents are baked there!). DO NOT override color, metalness, or
        // roughness — Meshy's maps handle them per-pixel.
        const isMetallic = (mat.metalness ?? 0) > 0.4;
        if (isMetallic) {
          // Keep emissive properties as Meshy set them. We only nudge the global
          // emissiveIntensity slightly via the animation timeline for visor power-up.
          visorMaterials.push(mat);
        }
        mat.needsUpdate = true;
      });
    }
  });
  console.log('GLB materials:', JSON.stringify(matInfo, null, 2));
  console.log('Visor materials detected:', visorMaterials.length);

  figurePivot.add(figure);
  window.READY = true;
}, undefined, (err) => {
  console.error('GLB load error', err);
  window.LOAD_ERROR = String(err);
});

function applyProgress(t) {
  t = Math.max(0, Math.min(1, t));

  // Camera dolly-in (5.4 → 4.1) + very subtle rise + look slightly up to keep
  // the head visible during the zoom
  camera.position.z = 5.4 - t * 1.3;
  camera.position.y = 0.7 + t * 0.1;
  camera.fov = 45 - t * 6; // 45 → 39
  camera.lookAt(0, 0.55 + t * 0.08, 0);
  camera.updateProjectionMatrix();

  // Figure yaw toward camera (~22° turn — gentle, premium)
  figurePivot.rotation.y = -t * 0.38;

  // Visor power-up : the emissive MAP (orange splashes/accents baked by Meshy) is
  // already there at intensity 1.0 by default. We boost it slightly with scroll to
  // create the "powering up" feel. Plus an orange point light for the glow halo.
  visorLight.intensity = 0.3 + t * 1.6;
  visorMaterials.forEach(mat => {
    mat.emissiveIntensity = 1.0 + t * 0.8; // 1.0 idle → 1.8 full power
  });

  // Particles intensify
  particleMat.opacity = 0.4 + t * 0.45;
}

/* Animation loop — drives the idle motion (particle drift) but NOT the scrub
   (scrub is driven by setProgress). */
const clock = new THREE.Clock();
function animate() {
  const time = clock.getElapsedTime();
  const pos = particleGeo.attributes.position;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    pos.array[i*3+1] += Math.sin(time * speeds[i] + phases[i]) * 0.0008;
  }
  pos.needsUpdate = true;
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

/* Public API for the capture script.
   setProgress(t) updates the scene to progress t in [0,1] and waits one frame
   to ensure the new render is on the canvas before screenshot. */
window.setProgress = (t) => {
  applyProgress(t);
  return new Promise(resolve => {
    requestAnimationFrame(() => {
      renderer.render(scene, camera);
      requestAnimationFrame(resolve);
    });
  });
};

/* Initialise to t=0 (idle state) */
applyProgress(0);
animate();
</script>
</body>
</html>
